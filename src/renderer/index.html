<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daara Re-Creation Manager</title>
    <link href="css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
    <!-- Sidebar -->
    <div id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-white shadow-lg border-r border-gray-200 z-40">
        <div class="p-6 border-b border-gray-200">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-mosque text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-900">Daara Re-Creation</h1>
                    <p class="text-sm text-gray-500">02-23 Août 2025</p>
                </div>
            </div>
        </div>
        
        <nav class="p-4 space-y-2">
            <div class="sidebar-item active" data-page="dashboard">
                <i class="fas fa-chart-pie w-5 h-5 mr-3"></i>
                <span>Dashboard</span>
            </div>
            <div class="sidebar-item" data-page="pensionnaires">
                <i class="fas fa-users w-5 h-5 mr-3"></i>
                <span>Pensionnaires</span>
            </div>
            <div class="sidebar-item" data-page="presences">
                <i class="fas fa-calendar-check w-5 h-5 mr-3"></i>
                <span>Présences</span>
            </div>
            <div class="sidebar-item" data-page="commissions">
                <i class="fas fa-user-tie w-5 h-5 mr-3"></i>
                <span>Commissions</span>
            </div>
            <div class="sidebar-item" data-page="alertes">
                <i class="fas fa-exclamation-triangle w-5 h-5 mr-3"></i>
                <span>Alertes</span>
                <span id="alertes-badge" class="ml-auto badge badge-danger hidden">0</span>
            </div>
            <div class="sidebar-item" data-page="rapports">
                <i class="fas fa-file-alt w-5 h-5 mr-3"></i>
                <span>Rapports</span>
            </div>
        </nav>
        
        <div class="absolute bottom-4 left-4 right-4">
            <div class="text-xs text-gray-500 text-center">
                <p>Version 1.0.0</p>
                <p>© 2025 Daara Re-Creation</p>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="ml-64 min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b border-gray-200 px-6 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <h2 id="page-title" class="text-2xl font-bold text-gray-900">Dashboard</h2>
                    <p id="page-subtitle" class="text-gray-600">Vue d'ensemble du Daara</p>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p class="text-sm font-medium text-gray-900" id="current-date"></p>
                        <p class="text-xs text-gray-500" id="current-time"></p>
                    </div>
                    <div class="w-8 h-8 bg-primary-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-user text-white text-sm"></i>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main id="page-content" class="p-6">
            <!-- Le contenu des pages sera chargé ici dynamiquement -->
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
        <div class="bg-white rounded-lg p-6 flex items-center space-x-3">
            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-primary-600"></div>
            <span class="text-gray-700">Chargement...</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../database/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/pensionnaires.js"></script>
    <script src="js/presences.js"></script>
    <script src="js/commissions.js"></script>
    <script src="js/alertes.js"></script>
    <script src="js/rapports.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
